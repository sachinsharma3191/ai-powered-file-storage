services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: storage_control_plane
      POSTGRES_PASSWORD: storage_control_plane
      POSTGRES_DB: storage_control_plane_production
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storage_control_plane -d storage_control_plane_production"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  storage_files:
    image: busybox:latest
    volumes:
      - storage_files_data:/app/storage
    command: /bin/true

  chunk-gateway:
    build:
      context: ./services/chunk-gateway
    environment:
      SCOPED_JWT_SECRET: dev-scoped-jwt-secret
      BIND_ADDR: 0.0.0.0
      PORT: "4000"
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  storage-control-plane:
    build:
      context: ./services/storage-control-plane
      dockerfile: Dockerfile.test
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      STORAGE_CONTROL_PLANE_DATABASE_PASSWORD: storage_control_plane
      DATABASE_URL: postgres://storage_control_plane:storage_control_plane@postgres:5432/storage_control_plane_production
      CACHE_DATABASE_URL: postgres://storage_control_plane:storage_control_plane@postgres:5432/storage_control_plane_production_cache
      QUEUE_DATABASE_URL: postgres://storage_control_plane:storage_control_plane@postgres:5432/storage_control_plane_production_queue
      CABLE_DATABASE_URL: postgres://storage_control_plane:storage_control_plane@postgres:5432/storage_control_plane_production_cable
      SECRET_KEY_BASE: dev-secret-key-base-must-be-at-least-32-bytes-long
      API_KEY_PEPPER: dev-api-key-pepper
      SCOPED_JWT_SECRET: dev-scoped-jwt-secret
      BOOTSTRAP_TOKEN: dev-bootstrap-token
      CHUNK_GATEWAY_BASE_URL_usw2: http://host.docker.internal:4000
      CHUNK_GATEWAY_BASE_URL: http://host.docker.internal:4000
      OLLAMA_URL: http://ollama:11434
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin-secret-2024}
    ports:
      - "3000:80"
    volumes:
      - storage-control-plane-storage:/rails/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/up || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  storage-ui:
    build:
      context: ./services/storage-ui
    depends_on:
      storage-control-plane:
        condition: service_healthy
    ports:
      - "4200:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  agent:
    profiles:
      - extras
    build:
      context: ./services/agent
    depends_on:
      storage-control-plane:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      STORAGE_API_URL: http://storage-control-plane:80
      STORAGE_API_KEY: ${STORAGE_API_KEY:-}
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
    stdin_open: true
    tty: true

  notification-service:
    profiles:
      - extras
    build:
      context: ./services/notification-service
    ports:
      - "9170:9170"

  outbox-worker:
    profiles:
      - extras
    build:
      context: ./services/outbox-worker
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://storage_control_plane:storage_control_plane@postgres:5432/storage_control_plane_production

volumes:
  postgres-data:
  redis_data:
  storage_files_data:
  storage-control-plane-storage:
  ollama-data:
